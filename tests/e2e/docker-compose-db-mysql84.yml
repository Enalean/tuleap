services:
  proxysql-mysql84:
    image: ${DOCKER_REGISTRY:-docker.io}/proxysql/proxysql:3.0.5@sha256:a8a90427035b0daafb64262334c70f9feb690a9a997c090fc4d846584b99f367
    volumes:
      - ./tests/etc/DBConfig/sqlproxy-84.cnf:/etc/proxysql.cnf:ro,cached
    depends_on:
      mysql84:
        condition: service_healthy
    restart: on-failure
    networks:
      tuleap:
        aliases:
          - proxysql-db
  mysql84:
    image: ${DOCKER_REGISTRY:-docker.io}/mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=welcome0
    volumes:
      - ./tests/etc/DBConfig/mysql-server-8.cnf:/etc/mysql/conf.d/mysql-server.cnf:ro,cached
    tmpfs: /tmp
    cap_add:
      - SYS_NICE
    healthcheck:
      test: mysql --host=127.0.0.1 --user=root --password=welcome0 --execute="SHOW DATABASES;"
      interval: 1s
      start_period: 20s
    networks:
      tuleap:
        aliases:
          - db
