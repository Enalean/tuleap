services:
  tests:
    image: ${DOCKER_REGISTRY:-ghcr.io}/enalean/tuleap-aio-dev:el9-${PHP_VERSION}
    environment:
      - DB_HOST=${DB_HOST}
      - USE_PROXYSQL
      - PHP_VERSION=${PHP_VERSION}
      - PHP_FPM=/opt/remi/${PHP_VERSION}/root/usr/sbin/php-fpm
      - PHP_CLI=/opt/remi/${PHP_VERSION}/root/usr/bin/php
      - SKIP_SANITY_CHECK=1
      - DISPLAY_ERRORS=true
      - SEED
    volumes:
      - ${BASEDIR}:/usr/share/tuleap:ro,cached
      - ${BASEDIR}/tools/docker/tuleap-aio-dev/license.key:/etc/tuleap/conf/license.key:ro,cached
    command: /usr/share/tuleap/tests/integration/bin/run.sh
    depends_on:
      - proxysql-${DB_HOST}

  proxysql-mysql80:
    image: ${DOCKER_REGISTRY:-docker.io}/proxysql/proxysql:3.0.5@sha256:a8a90427035b0daafb64262334c70f9feb690a9a997c090fc4d846584b99f367
    volumes:
      - ../etc/DBConfig/sqlproxy-84.cnf:/etc/proxysql.cnf:ro,cached
    depends_on:
      mysql80:
        condition: service_healthy
    restart: on-failure

  mysql80:
    image: ${DOCKER_REGISTRY:-docker.io}/mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=welcome0
    volumes:
      - ../etc/DBConfig/mysql-server-8.cnf:/etc/mysql/conf.d/mysql-server.cnf:ro,cached
    tmpfs: /tmp
    healthcheck:
      test: mysql --host=127.0.0.1 --user=root --password=welcome0 --execute="SHOW DATABASES;"
      interval: 1s
      start_period: 20s

  proxysql-mysql84:
    image: ${DOCKER_REGISTRY:-docker.io}/proxysql/proxysql:3.0.5@sha256:a8a90427035b0daafb64262334c70f9feb690a9a997c090fc4d846584b99f367
    volumes:
      - ../etc/DBConfig/sqlproxy-84.cnf:/etc/proxysql.cnf:ro,cached
    depends_on:
      mysql84:
        condition: service_healthy
    restart: on-failure

  mysql84:
    image: ${DOCKER_REGISTRY:-docker.io}/mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=welcome0
    volumes:
      - ../etc/DBConfig/mysql-server-8.cnf:/etc/mysql/conf.d/mysql-server.cnf:ro,cached
    tmpfs: /tmp
    healthcheck:
      test: mysql --host=127.0.0.1 --user=root --password=welcome0 --execute="SHOW DATABASES;"
      interval: 1s
      start_period: 20s

networks:
  default:
    internal: true
